name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  release:
    types: [ created ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Server
        run: |
          pyinstaller --clean server.spec
          if (Test-Path "dist\IPv6ProxyServer.exe") { Write-Host "Server built successfully" }

      - name: Build Client
        run: |
          pyinstaller --clean client.spec
          if (Test-Path "dist\IPv6ProxyClient.exe") { Write-Host "Client built successfully" }

      - name: Upload Server EXE
        uses: actions/upload-artifact@v4
        with:
          name: IPv6ProxyServer
          path: dist\IPv6ProxyServer.exe

      - name: Upload Client EXE
        uses: actions/upload-artifact@v4
        with:
          name: IPv6ProxyClient
          path: dist\IPv6ProxyClient.exe

      - name: Upload Both EXE
        uses: actions/upload-artifact@v4
        with:
          name: IPv6Proxy
          path: dist\*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Server EXE
        uses: actions/download-artifact@v4
        with:
          name: IPv6ProxyServer
          path: dist

      - name: Download Client EXE
        uses: actions/download-artifact@v4
        with:
          name: IPv6ProxyClient
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
