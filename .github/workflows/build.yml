name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Server
        run: |
          pyinstaller --clean server.spec

      - name: Build Client
        run: |
          pyinstaller --clean client.spec

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path "dist\IPv6ProxyServer.exe", "dist\IPv6ProxyClient.exe" -DestinationPath "IPv6Proxy.zip" -Force

      - name: List files
        run: |
          dir dist
          dir *.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: IPv6Proxy.zip
          body: "IPv6 Proxy Server and Client build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}