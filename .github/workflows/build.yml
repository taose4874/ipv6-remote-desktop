name: Build and Release EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      - name: Prepare common module for server
        run: |
          if (-not (Test-Path "server\common")) { New-Item -ItemType Directory -Path "server\common" -Force }
          Copy-Item common\*.py server\common\ -Force

      - name: Prepare common module for client
        run: |
          if (-not (Test-Path "client\common")) { New-Item -ItemType Directory -Path "client\common" -Force }
          Copy-Item common\*.py client\common\ -Force

      - name: Build Server
        run: |
          pyinstaller --clean server.spec
          if (Test-Path "dist\IPv6RemoteDesktop_Server.exe") { Write-Host "Server built successfully" }

      - name: Build Client
        run: |
          pyinstaller --clean client.spec
          if (Test-Path "dist\IPv6RemoteDesktop_Client.exe") { Write-Host "Client built successfully" }

      - name: Upload EXE files
        uses: actions/upload-artifact@v4
        with:
          name: IPv6RemoteDesktop-EXE
          path: dist/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download EXE files
        uses: actions/download-artifact@v4
        with:
          name: IPv6RemoteDesktop-EXE
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
