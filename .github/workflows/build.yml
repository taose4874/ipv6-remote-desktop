name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-win10:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11 (Win10+)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Server
        run: |
          pyinstaller --clean server.spec

      - name: Build Client
        run: |
          pyinstaller --clean client.spec

      - name: Rename files for Win10
        run: |
          Rename-Item -Path "dist\IPv6ProxyServer.exe" -NewName "IPv6穿透服务端_Win10.exe" -Force
          Rename-Item -Path "dist\IPv6ProxyClient.exe" -NewName "IPv6穿透客户端_Win10.exe" -Force

      - name: Create ZIP for Win10
        run: |
          Compress-Archive -Path "dist\IPv6穿透服务端_Win10.exe", "dist\IPv6穿透客户端_Win10.exe" -DestinationPath "IPv6穿透工具_Win10.zip" -Force

      - name: Upload Win10 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Win10-Build
          path: IPv6穿透工具_Win10.zip

  build-win7:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.8 (Win7 compatible)
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          cache: 'pip'

      - name: Install dependencies for Win7
        run: |
          pip install PyQt5>=5.15.0
          pip install pyinstaller

      - name: Build Server for Win7
        run: |
          pyinstaller --clean server.spec

      - name: Build Client for Win7
        run: |
          pyinstaller --clean client.spec

      - name: Rename files for Win7
        run: |
          Rename-Item -Path "dist\IPv6ProxyServer.exe" -NewName "IPv6穿透服务端_Win7.exe" -Force
          Rename-Item -Path "dist\IPv6ProxyClient.exe" -NewName "IPv6穿透客户端_Win7.exe" -Force

      - name: Create ZIP for Win7
        run: |
          Compress-Archive -Path "dist\IPv6穿透服务端_Win7.exe", "dist\IPv6穿透客户端_Win7.exe" -DestinationPath "IPv6穿透工具_Win7.zip" -Force

      - name: Upload Win7 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Win7-Build
          path: IPv6穿透工具_Win7.zip

  release:
    needs: [build-win10, build-win7]
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Win10 artifact
        uses: actions/download-artifact@v4
        with:
          name: Win10-Build
          path: .

      - name: Download Win7 artifact
        uses: actions/download-artifact@v4
        with:
          name: Win7-Build
          path: .

      - name: List files
        run: ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            IPv6穿透工具_Win10.zip
            IPv6穿透工具_Win7.zip
          body: "IPv6 内网穿透工具\n\n包含两个版本：\n- Win10+: IPv6穿透工具_Win10.zip\n- Win7: IPv6穿透工具_Win7.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}