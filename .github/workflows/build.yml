name: Build and Release Relay Server

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Server
        run: |
          pyinstaller --clean server.spec
          if (Test-Path "dist\IPv6GameRelayServer.exe") { Write-Host "Server built successfully" }

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: IPv6GameRelayServer
          path: dist\IPv6GameRelayServer.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: IPv6GameRelayServer
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist\IPv6GameRelayServer.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
