name: Build EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      - name: Show directory structure
        run: |
          Get-ChildItem -Recurse

      - name: Prepare common module for server
        run: |
          if (-not (Test-Path "server\common")) { New-Item -ItemType Directory -Path "server\common" -Force }
          Copy-Item common\*.py server\common\ -Force

      - name: Prepare common module for client
        run: |
          if (-not (Test-Path "client\common")) { New-Item -ItemType Directory -Path "client\common" -Force }
          Copy-Item common\*.py client\common\ -Force

      - name: Build Server
        run: |
          pyinstaller --clean server.spec
          if (Test-Path "dist\IPv6RemoteDesktop_Server.exe") { Write-Host "Server built successfully" }

      - name: Build Client
        run: |
          pyinstaller --clean client.spec
          if (Test-Path "dist\IPv6RemoteDesktop_Client.exe") { Write-Host "Client built successfully" }

      - name: Check dist directory
        run: |
          Get-ChildItem dist

      - name: Upload Server EXE
        uses: actions/upload-artifact@v4
        with:
          name: IPv6RemoteDesktop-Server
          path: dist/IPv6RemoteDesktop_Server.exe
          if-no-files-found: warn

      - name: Upload Client EXE
        uses: actions/upload-artifact@v4
        with:
          name: IPv6RemoteDesktop-Client
          path: dist/IPv6RemoteDesktop_Client.exe
          if-no-files-found: warn

      - name: Upload both EXEs together
        uses: actions/upload-artifact@v4
        with:
          name: IPv6RemoteDesktop-All
          path: dist/*.exe
          if-no-files-found: warn
