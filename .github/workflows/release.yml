name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Build Server
        run: |
          pyinstaller --clean server.spec
          
      - name: Build Client
        run: |
          pyinstaller --clean client.spec
          
      - name: Create ZIP archives
        run: |
          Compress-Archive -Path dist/IPv6RemoteDesktop_Server.exe -DestinationPath IPv6RemoteDesktop_Server.zip
          Compress-Archive -Path dist/IPv6RemoteDesktop_Client.exe -DestinationPath IPv6RemoteDesktop_Client.zip
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            IPv6RemoteDesktop_Server.zip
            IPv6RemoteDesktop_Client.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
